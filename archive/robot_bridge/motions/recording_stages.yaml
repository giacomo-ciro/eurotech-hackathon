default:
  stages:
    - name: arming
      detail: Cameras up; teleop link armed
      duration_s: 1.5
    - name: recording
      detail: Capturing frames + joint states
      duration_s: 3.0
    - name: captioning
      detail: Streaming frames to Claude for synthetic captions
      duration_s: 2.0
    - name: saved
      detail: Episode written to dataset shard
      duration_s: 1.0

