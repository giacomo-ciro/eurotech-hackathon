services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dispensr-backend
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      DISPENSR_DATA_DIR: /srv/data
      ROBOT_BRIDGE_URL: ws://host.docker.internal:8001/ws
      ROBOT_BRIDGE_HTTP: http://host.docker.internal:8001
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./data:/srv/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: dispensr-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NEXT_PUBLIC_RERUN_URL: http://localhost:9090
    depends_on:
      - backend
    restart: unless-stopped
